<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Lynq Hire - Hire with clarity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
    }

    .container {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Cyan gradient overlay */
    .gradient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 630px;
      background:
        radial-gradient(ellipse 800px 400px at 50% 60%, rgba(8, 145, 178, 0.12), transparent),
        radial-gradient(ellipse 600px 300px at 20% 30%, rgba(6, 182, 212, 0.08), transparent);
      pointer-events: none;
    }

    /* Subtle grid pattern */
    .grid-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 630px;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .logo-area {
      position: relative;
      margin-top: 40px;
      text-align: center;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
    }

    .logo-wordmark {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
      color: #fff;
      display: inline-block;
    }

    .headline {
      position: relative;
      margin-top: 28px;
      font-weight: 700;
      font-size: 36px;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    .subline {
      position: relative;
      margin-top: 12px;
      font-weight: 400;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      max-width: 560px;
    }

    /* Dashboard mockup */
    .dashboard {
      position: relative;
      margin-top: 32px;
      width: 420px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(8, 145, 178, 0.1);
    }

    .dashboard-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .dashboard-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dashboard-badge {
      font-size: 10px;
      font-weight: 600;
      color: #0891b2;
      background: rgba(8, 145, 178, 0.12);
      border: 1px solid rgba(8, 145, 178, 0.25);
      border-radius: 6px;
      padding: 3px 8px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #0891b2;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 3px;
    }

    /* Mini table */
    .mini-table {
      width: 100%;
    }

    .table-header {
      display: flex;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .table-header span {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .col-title { flex: 2; }
    .col-status { flex: 1; text-align: center; }
    .col-apps { flex: 1; text-align: right; }

    .table-row {
      display: flex;
      align-items: center;
      padding: 7px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .table-row:last-child {
      border-bottom: none;
    }

    .row-title {
      flex: 2;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
    }

    .row-status {
      flex: 1;
      text-align: center;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .status-dot.live { background: #22c55e; }
    .status-dot.review { background: #fb923c; }

    .status-text {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.45);
      vertical-align: middle;
    }

    .row-apps {
      flex: 1;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
    }

    .footer-url {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 400;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gradient-bg"></div>
    <div class="grid-pattern"></div>

    <div class="logo-area">
      <span class="logo-lockup">
        <svg class="logo-icon" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 977.067V1.37076C161.691 -12.6483 220.253 84.3169 229.322 134.552V777.298H454.757L349.813 977.067H0Z" fill="#06B6D4"/>
          <path d="M1200 456.99V1200H1126.15C1020.43 1183.18 983.631 1094.86 978.448 1052.8V947.657C791.881 1026.16 667.922 963.645 608.324 921.588L752.136 767.378C914.474 797.44 978.448 729.573 978.448 670.781V492.038C970.923 298.616 699.967 325.763 682.173 427.416L523.094 507.308L617.176 573.478C590.833 607.412 534.383 682.066 511.804 702.426C489.224 722.786 470.99 737.004 460.625 739.34C242.964 52.406 1126.15 -54.7061 1200 456.99Z" fill="#06B6D4"/>
          <path d="M446.984 777.326L342.04 977.098C361.474 977.098 429.882 972.892 501.4 961.677C572.917 950.462 668.533 888.077 699.627 849.524L831.779 646.248L928.949 688.305L866.76 397.409L583.023 509.562L668.533 562.133C624.482 622.883 536.381 746.484 536.381 754.896C536.381 763.307 475.488 772.653 446.984 777.326Z" fill="url(#og-emp-grad)"/>
          <defs><linearGradient id="og-emp-grad" x1="635.495" y1="397.409" x2="635.495" y2="977.098" gradientUnits="userSpaceOnUse"><stop stop-color="#FB923C"/><stop offset="1" stop-color="#F97316"/></linearGradient></defs>
        </svg>
        <span class="logo-wordmark">Lynq</span>
      </span>
    </div>

    <div class="headline">Hire with clarity, not chaos</div>
    <div class="subline">One dashboard for your jobs, candidates, and hiring data</div>

    <!-- Dashboard mockup -->
    <div class="dashboard">
      <div class="dashboard-top">
        <div class="dashboard-title">Hiring Overview</div>
        <div class="dashboard-badge">Live</div>
      </div>

      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-value">12</div>
          <div class="stat-label">Active Jobs</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">284</div>
          <div class="stat-label">Candidates</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">18</div>
          <div class="stat-label">Interviews</div>
        </div>
      </div>

      <div class="mini-table">
        <div class="table-header">
          <span class="col-title">Position</span>
          <span class="col-status">Status</span>
          <span class="col-apps">Apps</span>
        </div>
        <div class="table-row">
          <div class="row-title">Frontend Engineer</div>
          <div class="row-status">
            <span class="status-dot live"></span>
            <span class="status-text">Live</span>
          </div>
          <div class="row-apps">47</div>
        </div>
        <div class="table-row">
          <div class="row-title">Product Designer</div>
          <div class="row-status">
            <span class="status-dot live"></span>
            <span class="status-text">Live</span>
          </div>
          <div class="row-apps">38</div>
        </div>
        <div class="table-row">
          <div class="row-title">Backend Engineer</div>
          <div class="row-status">
            <span class="status-dot review"></span>
            <span class="status-text">Review</span>
          </div>
          <div class="row-apps">62</div>
        </div>
      </div>
    </div>

    <div class="footer-url">lynq.jobs</div>
  </div>
</body>
</html>
